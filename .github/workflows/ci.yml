name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (codeQuality + test + coverage + screenshots + Sonar)
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history: SonarCloud needs it for per-line blame and the new-code period.
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Static analysis (codeQuality)
        run: ./gradlew codeQuality --no-daemon --stacktrace

      - name: Unit tests, coverage gate and screenshot gate
        run: ./gradlew testDebugUnitTest koverVerifyDebug verifyRoborazziDebug --no-daemon --stacktrace

      - name: SonarCloud analysis
        if: ${{ env.SONAR_TOKEN != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew sonar --no-daemon --stacktrace

      - name: Upload reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: reports
          path: |
            app/build/reports/
            app/build/outputs/roborazzi/
          if-no-files-found: ignore
          retention-days: 7
